<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>note-architect</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar glass">
        <h1>Note Architect</h1>
        <p class="muted">Novel Assistant</p>
        <nav>
          <button class="tab-btn active" data-tab="dashboard">ダッシュボード</button>
          <button class="tab-btn" data-tab="writing">執筆</button>
          <button class="tab-btn" data-tab="characters">キャラクター</button>
          <button class="tab-btn" data-tab="world">世界観</button>
          <button class="tab-btn" data-tab="timeline">年表</button>
          <button class="tab-btn" data-tab="ai">AI補助</button>
          <button class="tab-btn" data-tab="data">データ</button>
        </nav>
      </aside>

      <main class="content">
        <section id="tab-dashboard" class="tab active">
          <h2>プロジェクト概要</h2>
          <div class="stats" id="stats"></div>
        </section>

        <section id="tab-writing" class="tab">
          <h2>章・シーン管理</h2>
          <div class="grid2">
            <div class="card">
              <h3>章を追加</h3>
              <input id="chapter-title" placeholder="章タイトル" />
              <button id="save-chapter" class="primary">章を追加</button>
              <ul id="chapter-list"></ul>
            </div>
            <div class="card">
              <h3>シーンを追加</h3>
              <input id="scene-title" placeholder="シーンタイトル" />
              <select id="scene-chapter"></select>
              <textarea id="scene-content" placeholder="本文"></textarea>
              <button id="save-scene" class="primary">シーンを保存</button>
              <ul id="scene-list"></ul>
            </div>
          </div>
        </section>

        <section id="tab-characters" class="tab"><h2>キャラクター</h2><div class="card"><input id="character-name" placeholder="名前" /><input id="character-role" placeholder="役割" /><textarea id="character-note" placeholder="メモ"></textarea><button id="save-character" class="primary">保存</button><ul id="character-list"></ul></div></section>
        <section id="tab-world" class="tab"><h2>世界観</h2><div class="card"><select id="world-type"><option value="PLACE">地名</option><option value="ORGANIZATION">組織</option><option value="ITEM">アイテム</option><option value="RULE">ルール</option><option value="TERM">用語</option></select><input id="world-name" placeholder="名称" /><textarea id="world-description" placeholder="説明"></textarea><button id="save-world" class="primary">保存</button><ul id="world-list"></ul></div></section>
        <section id="tab-timeline" class="tab"><h2>年表</h2><div class="card"><input id="timeline-at" placeholder="時点" /><input id="timeline-label" placeholder="イベント名" /><textarea id="timeline-description" placeholder="詳細"></textarea><button id="save-timeline" class="primary">保存</button><ul id="timeline-list"></ul></div></section>

        <section id="tab-ai" class="tab">
          <h2>AI補助</h2>
          <div class="card">
            <textarea id="ai-input" placeholder="本文またはあらすじ"></textarea>
            <div class="actions-row">
              <button id="ai-plot" class="primary">プロット提案</button>
              <button id="ai-rewrite">リライト</button>
              <button id="ai-critique">批評</button>
            </div>
            <pre id="ai-output"></pre>
          </div>
        </section>

        <section id="tab-data" class="tab">
          <h2>データ管理</h2>
          <div class="card actions-row">
            <button id="export-json">JSONエクスポート</button>
            <label class="file-label">JSONインポート<input id="import-json" type="file" accept="application/json" /></label>
            <button id="clear-all" class="danger">全削除</button>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
